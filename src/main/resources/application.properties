spring.application.name=personal-finance-tracker
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/personal_finance_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JWT settings
app.security.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZURlZmF1bHRKd3RTZWNyZXRLZXlGb3JEZXZPbmx5MTIzNDU2}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.security.jwt.refresh-token-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.security.password-reset-token-ms=${PASSWORD_RESET_EXPIRATION_MS:3600000}
